<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>قسطني | Qastni</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/src/styles/main.css"/>
</head>
<body>
  <div id="app">
    <!-- Loading screen -->
    <div id="loading-screen" style="
      position:fixed;inset:0;
      background:linear-gradient(135deg,#0f172a,#1e3a5f);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      z-index:9999;gap:20px;
    ">
      <div style="
        width:64px;height:64px;
        background:linear-gradient(135deg,#2563eb,#1e40af);
        border-radius:16px;
        display:flex;align-items:center;justify-content:center;
        font-size:30px;font-weight:900;color:#fff;
        box-shadow:0 8px 32px rgba(37,99,235,.5);
      ">ق</div>
      <div style="color:#fff;font-size:20px;font-weight:800;font-family:'Tajawal',sans-serif">قسطني</div>
      <div style="
        width:40px;height:40px;
        border:3px solid rgba(255,255,255,.2);
        border-top-color:#fff;
        border-radius:50%;
        animation:spin .8s linear infinite;
      "></div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
