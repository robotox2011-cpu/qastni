<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>قسطني | Qastni</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --b50:#eff6ff;--b100:#dbeafe;--b200:#bfdbfe;--b300:#93c5fd;
  --b500:#3b82f6;--b600:#2563eb;--b700:#1d4ed8;--b800:#1e40af;
  --g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;
  --g400:#94a3b8;--g500:#64748b;--g600:#475569;--g700:#334155;--g800:#1e293b;--g900:#0f172a;
  --green50:#f0fdf4;--green100:#dcfce7;--green500:#22c55e;--green600:#16a34a;--green700:#15803d;
  --red50:#fef2f2;--red100:#fee2e2;--red500:#ef4444;--red600:#dc2626;
  --amber50:#fffbeb;--amber100:#fef3c7;--amber500:#f59e0b;--amber600:#d97706;
  --white:#fff;
  --sh-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);
  --sh-lg:0 12px 32px rgba(0,0,0,.1),0 4px 8px rgba(0,0,0,.06);
  --sh-xl:0 24px 48px rgba(0,0,0,.12),0 8px 16px rgba(0,0,0,.06);
  --r8:8px;--r10:10px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;
  --ease:cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Tajawal',sans-serif;background:var(--g50);color:var(--g900);min-height:100vh;direction:rtl;-webkit-font-smoothing:antialiased}
body.en{font-family:'Inter',sans-serif;direction:ltr}
.hidden{display:none!important}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--g100)}::-webkit-scrollbar-thumb{background:var(--g300);border-radius:10px}

.app-shell{display:flex;min-height:100vh}
.sidebar{width:248px;min-width:248px;background:var(--white);border-inline-end:1px solid var(--g200);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:20}
.main-area{flex:1;overflow-x:hidden;display:flex;flex-direction:column}
.topbar{background:var(--white);border-bottom:1px solid var(--g200);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:15;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.page-wrap{padding:28px;flex:1}
.page-inner{animation:pageIn .22s var(--ease)}
@keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.sb-brand{padding:20px 18px 16px;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:11px}
.sb-brand-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--b600),var(--b800));border-radius:var(--r10);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:900;flex-shrink:0;box-shadow:0 4px 10px rgba(37,99,235,.35)}
.sb-brand-name{font-size:18px;font-weight:900;color:var(--b700)}
.sb-brand-tag{font-size:10px;color:var(--g400);margin-top:1px}
.sb-nav{padding:12px 10px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r8);font-size:13.5px;font-weight:500;color:var(--g600);cursor:pointer;transition:all .14s;border:none;background:none;width:100%;text-align:inherit;margin-bottom:2px;position:relative}
.nav-item:hover{background:var(--g100);color:var(--g900)}
.nav-item.active{background:var(--b50);color:var(--b700);font-weight:700}
.nav-item.active::before{content:'';position:absolute;inset-inline-start:0;top:6px;bottom:6px;width:3px;background:var(--b600);border-radius:0 3px 3px 0}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{background:var(--red500);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;padding:0 5px;border-radius:99px;display:flex;align-items:center;justify-content:center;margin-inline-start:auto}
.sb-footer{padding:12px 10px;border-top:1px solid var(--g100)}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r10);background:var(--g50);border:1px solid var(--g200);margin-bottom:8px}
.sb-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;color:#fff}
.sb-user-name{font-size:13px;font-weight:700;color:var(--g800)}
.sb-user-email{font-size:11px;color:var(--g400);margin-top:1px}

.card{background:var(--white);border:1px solid var(--g200);border-radius:var(--r16);box-shadow:var(--sh-sm);overflow:hidden}
.card-header{padding:16px 22px 14px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-header h2,.card-header h3{flex:1;font-size:15px;font-weight:700;color:var(--g800)}
.card-body{padding:20px 22px}
.card-footer{padding:14px 22px;border-top:1px solid var(--g100);background:var(--g50);border-radius:0 0 var(--r16) var(--r16)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:var(--r8);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .14s;white-space:nowrap;text-decoration:none;line-height:1.4;user-select:none}
.btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
.btn-primary{background:var(--b600);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.btn-primary:hover{background:var(--b700);transform:translateY(-1px)}
.btn-secondary{background:var(--b50);color:var(--b700);border:1.5px solid var(--b200)}
.btn-secondary:hover{background:var(--b100)}
.btn-ghost{background:transparent;color:var(--g600);border:1.5px solid var(--g300)}
.btn-ghost:hover{background:var(--g100);color:var(--g800)}
.btn-danger{background:var(--red50);color:var(--red600);border:1.5px solid #fca5a5}
.btn-danger:hover{background:var(--red100)}
.btn-success{background:var(--green50);color:var(--green700);border:1.5px solid #86efac}
.btn-success:hover{background:var(--green100)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px}
.btn-lg{padding:12px 24px;font-size:15px;border-radius:var(--r10)}
.btn-full{width:100%;justify-content:center}

.lang-btn{padding:5px 13px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--b200);background:var(--b50);color:var(--b700);transition:all .14s;font-family:inherit}
.lang-btn:hover{background:var(--b100)}

.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12.5px;font-weight:700;color:var(--g700);margin-bottom:6px}
.form-label .req{color:var(--red600);margin-inline-start:2px}
.form-control{width:100%;padding:10px 14px;border:1.5px solid var(--g300);border-radius:var(--r8);font-size:13.5px;font-family:inherit;color:var(--g900);background:var(--white);transition:all .14s;outline:none;line-height:1.4}
.form-control:focus{border-color:var(--b500);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.form-control::placeholder{color:var(--g400)}
textarea.form-control{resize:vertical;min-height:80px}
select.form-control{cursor:pointer}
.form-hint{font-size:11.5px;color:var(--g400);margin-top:4px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

.calc-box{background:linear-gradient(135deg,var(--b50),#eef2ff);border:1.5px solid var(--b200);border-radius:var(--r10);padding:14px 18px;margin-top:6px;display:flex;align-items:center;justify-content:space-between}
.calc-label{font-size:13px;font-weight:700;color:var(--b700)}
.calc-sublabel{font-size:11px;color:var(--b500);margin-top:2px}
.calc-value{font-size:22px;font-weight:900;color:var(--b700)}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:700}
.badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.b-blue{background:var(--b100);color:var(--b800)}.b-blue .badge-dot{background:var(--b500)}
.b-green{background:var(--green100);color:var(--green700)}.b-green .badge-dot{background:var(--green500)}
.b-red{background:var(--red100);color:var(--red600)}.b-red .badge-dot{background:var(--red500)}
.b-amber{background:var(--amber100);color:var(--amber600)}.b-amber .badge-dot{background:var(--amber500)}
.b-gray{background:var(--g100);color:var(--g600)}.b-gray .badge-dot{background:var(--g400)}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
.stat-card{background:var(--white);border:1px solid var(--g200);border-radius:var(--r16);padding:18px 20px;box-shadow:var(--sh-sm);transition:all .14s}
.stat-card:hover{box-shadow:var(--sh-md);transform:translateY(-2px)}
.stat-icon{width:40px;height:40px;border-radius:var(--r10);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px}
.stat-value{font-size:28px;font-weight:900;color:var(--g900);line-height:1}
.stat-label{font-size:11.5px;color:var(--g500);margin-top:4px;font-weight:600}

.deal-card{background:var(--white);border:1px solid var(--g200);border-radius:var(--r16);padding:18px 20px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;transition:all .16s;box-shadow:var(--sh-sm);margin-bottom:10px}
.deal-card:hover{border-color:var(--b300);box-shadow:var(--sh-md);transform:translateY(-2px)}
.deal-icon{width:46px;height:46px;border-radius:var(--r10);background:linear-gradient(135deg,var(--b50),var(--b100));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:1px solid var(--b200)}
.deal-body{flex:1;min-width:0}
.deal-title{font-size:14.5px;font-weight:700;color:var(--g900);margin-bottom:3px}
.deal-meta{font-size:11.5px;color:var(--g400);margin-bottom:6px}
.deal-right{text-align:end;flex-shrink:0}
.deal-price{font-size:16px;font-weight:800;color:var(--b700)}
.deal-price-sub{font-size:10.5px;color:var(--g400);margin-top:2px}

.progress-track{height:6px;background:var(--g100);border-radius:99px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:99px;transition:width .5s}
.pf-blue{background:linear-gradient(90deg,var(--b300),var(--b600))}
.pf-green{background:linear-gradient(90deg,var(--green500),var(--green600))}
.progress-label{display:flex;justify-content:space-between;font-size:11px;margin-top:4px;color:var(--g500)}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.info-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.info-item{background:var(--g50);border-radius:var(--r10);padding:12px 14px;border:1px solid var(--g200)}
.info-label{font-size:10px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.info-value{font-size:15px;font-weight:700;color:var(--g900)}
.info-value.blue{color:var(--b700)}
.info-sub{font-size:11px;color:var(--g400);margin-top:2px}

.pay-table{width:100%;border-collapse:collapse}
.pay-table th{text-align:start;padding:10px 14px;font-size:11.5px;font-weight:700;color:var(--g500);background:var(--g50);border-bottom:1.5px solid var(--g200)}
.pay-table td{padding:12px 14px;font-size:13px;color:var(--g700);border-bottom:1px solid var(--g100);vertical-align:middle}
.pay-table tr:last-child td{border-bottom:none}
.pay-table tr.row-paid{background:linear-gradient(90deg,var(--green50),var(--white))}
.pay-table tr.row-overdue{background:linear-gradient(90deg,var(--amber50),var(--white))}
.pay-table tbody tr:hover td{background:var(--g50)}

.tab-bar{display:flex;gap:2px;background:var(--g100);padding:3px;border-radius:var(--r10);margin-bottom:20px;width:fit-content}
.tab-btn{padding:7px 16px;font-size:12.5px;font-weight:600;border:none;background:transparent;border-radius:var(--r8);cursor:pointer;color:var(--g500);transition:all .14s;font-family:inherit}
.tab-btn.active{background:var(--white);color:var(--b700);box-shadow:var(--sh-sm)}
.tab-btn:hover:not(.active){background:var(--g200);color:var(--g700)}

.auth-screen{min-height:100vh;background:linear-gradient(145deg,#0f172a,#1e3a5f 40%,#1d4ed8);display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.auth-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(59,130,246,.25),transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(99,102,241,.2),transparent 55%);pointer-events:none}
.auth-card{background:var(--white);border-radius:var(--r24);box-shadow:var(--sh-xl);width:100%;max-width:430px;overflow:hidden;position:relative;z-index:1}
.auth-header{background:linear-gradient(135deg,var(--b600),var(--b800));padding:32px 32px 28px;text-align:center}
.auth-logo{width:60px;height:60px;background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.25);border-radius:var(--r16);display:inline-flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#fff;margin-bottom:14px}
.auth-title{font-size:24px;font-weight:900;color:#fff}
.auth-sub{font-size:12.5px;color:rgba(255,255,255,.68);margin-top:4px}
.auth-tabs{display:flex;background:rgba(0,0,0,.25);border-radius:var(--r8);padding:3px;margin-top:18px}
.auth-tab{flex:1;padding:7px;font-size:12.5px;font-weight:700;border:none;background:transparent;color:rgba(255,255,255,.6);border-radius:6px;cursor:pointer;transition:all .14s;font-family:inherit}
.auth-tab.active{background:rgba(255,255,255,.2);color:#fff}
.auth-body{padding:28px 32px}
.auth-footer{padding:14px 32px;background:var(--g50);border-top:1px solid var(--g200);text-align:center}
.auth-footer-text{font-size:11px;color:var(--g400);line-height:1.6}

.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-box{background:var(--white);border-radius:var(--r20);box-shadow:var(--sh-xl);width:100%;max-height:90vh;overflow-y:auto;animation:pageIn .2s var(--ease)}
.modal-header{padding:20px 26px 16px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:2}
.modal-close{font-size:18px;cursor:pointer;color:var(--g400);border:none;background:none;padding:4px;border-radius:6px;transition:all .12s}
.modal-close:hover{background:var(--g100);color:var(--g700)}
.modal-body{padding:20px 26px}
.modal-footer{padding:16px 26px;border-top:1px solid var(--g100);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--white)}

.stars-input{display:flex;gap:6px;justify-content:center;margin:16px 0}
.star-rate{font-size:32px;cursor:pointer;transition:transform .1s;opacity:.35;filter:grayscale(1)}
.star-rate.active,.star-rate:hover{opacity:1;filter:none;transform:scale(1.15)}

.contract-wrap{background:var(--white);border:2px solid var(--g200);border-radius:var(--r16);overflow:hidden}
.contract-hdr{background:linear-gradient(135deg,var(--g900),var(--g800));padding:28px 32px;text-align:center;color:#fff}
.contract-body{padding:28px 32px}
.contract-section{margin-bottom:22px}
.contract-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g400);margin-bottom:12px;padding-bottom:8px;border-bottom:1.5px solid var(--g100)}
.contract-parties{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.contract-party{background:var(--g50);border:1px solid var(--g200);border-radius:var(--r10);padding:14px 16px}
.contract-party-role{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--g400);margin-bottom:6px}
.contract-party-name{font-size:15px;font-weight:700;color:var(--g900)}
.contract-party-email{font-size:11.5px;color:var(--g500);margin-top:2px}
.contract-fin{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.contract-fin-item{background:var(--b50);border:1px solid var(--b200);border-radius:var(--r8);padding:12px 14px}
.contract-fin-label{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--b500);margin-bottom:4px}
.contract-fin-value{font-size:16px;font-weight:800;color:var(--b800)}
.contract-terms{background:var(--g50);border:1px solid var(--g200);border-radius:var(--r10);padding:16px 18px;font-size:12.5px;color:var(--g600);line-height:1.9}
.contract-terms ol{padding-inline-start:18px}
.contract-sig-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px}
.contract-sig{border-top:1.5px solid var(--g300);padding-top:10px;text-align:center;font-size:11.5px;color:var(--g400)}
.contract-footer{padding:16px 32px;background:var(--g50);border-top:2px solid var(--g200);text-align:center;font-size:11.5px;color:var(--g400);line-height:1.6}

.toast-container{position:fixed;bottom:24px;inset-inline-end:24px;z-index:300;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:var(--r10);font-size:13px;font-weight:600;box-shadow:var(--sh-lg);pointer-events:auto;min-width:240px;animation:pageIn .25s var(--ease)}
.toast-exit{animation:toastOut .22s forwards}
@keyframes toastOut{to{opacity:0;transform:translateY(8px)}}
.toast-success{background:linear-gradient(135deg,var(--green700),var(--green600));color:#fff}
.toast-error{background:linear-gradient(135deg,var(--red600),#b91c1c);color:#fff}
.toast-info{background:linear-gradient(135deg,var(--b700),var(--b600));color:#fff}

.empty-state{text-align:center;padding:52px 24px;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-emoji{font-size:40px;opacity:.3}
.empty-title{font-size:16px;font-weight:700;color:var(--g700)}
.empty-desc{font-size:13px;color:var(--g400);max-width:280px;line-height:1.5}

.spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

.divider{height:1px;background:var(--g100);margin:16px 0}
.flex{display:flex}.aic{align-items:center}.jsb{justify-content:space-between}.jce{justify-content:flex-end}
.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}.mt24{margin-top:24px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}
.text-sm{font-size:12px}.text-xs{font-size:11px}.text-muted{color:var(--g500)}.text-blue{color:var(--b700)}
.fw-700{font-weight:700}.fw-800{font-weight:800}
.page-title{font-size:22px;font-weight:800;color:var(--g900);margin-bottom:4px}
.page-subtitle{font-size:13px;color:var(--g500);margin-bottom:24px;line-height:1.5}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px}
.section-title{font-size:15px;font-weight:700;color:var(--g900)}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.disclaimer-bar{background:var(--amber50);border:1px solid #fde68a;border-radius:var(--r8);padding:10px 16px;font-size:11.5px;font-weight:500;color:var(--amber600);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.alert{padding:12px 16px;border-radius:var(--r8);font-size:12.5px;font-weight:600;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px;border:1px solid transparent;line-height:1.5}
.alert-danger{background:var(--red50);color:var(--red600);border-color:#fca5a5}

@media(max-width:768px){
  .sidebar{display:none}.page-wrap{padding:16px}
  .form-row{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr 1fr}
  .info-grid,.info-grid-3,.contract-parties,.contract-fin,.contract-sig-row{grid-template-columns:1fr}
  .tab-bar{width:100%}
}
@media(max-width:480px){.stats-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-container" id="toast-container"></div>

<!-- Rating Modal -->
<div class="modal-overlay hidden" id="rating-modal">
  <div class="modal-box" style="max-width:420px">
    <div class="modal-header">

  const btn = $('login-btn')

window.doRegister = async () => {

  if(pass!==pass2){ showAuthErr('reg', isAr()?'كلمتا المرور غير متطابقتان':'Passwords do not match'); return }
  const btn = $('reg-btn')
  btn.innerHTML = '<span class="spinner"></span>'

  }
}

async function updateSbStars() {
  const {data} = await sb.from('ratings').select('stars').eq('to_email', CU.email)

  if(!data?.length){ el.innerHTML = `<span style="font-size:11px;color:var(--g400)">${isAr()?'لا تقييمات':'No ratings'}</span>`; return }
  const avg = Math.round(data.reduce((s,r)=>s+r.stars,0)/data.length*10)/10
  el.innerHTML = renderStars(avg, data.length, 12)

const PAGE_TITLES = {dash:{ar:'الرئيسية',en:'Dashboard'},create:{ar:'طلب جديد',en:'New Request'},incoming:{ar:'الطلبات الواردة',en:'Incoming'},deals:{ar:'صفقاتي',en:'My Deals'},detail:{ar:'تفاصيل الصفقة',en:'Deal Details'},profile:{ar:'ملفي الشخصي',en:'My Profile'}}

window.navigate = async (page, params={}) => {
  curPage = page
  window._pageParams = params
  ;['dash','create','incoming','deals','detail','profile'].forEach(p => {
    document.getElementById('page-'+p)?.classList.add('hidden')
    document.getElementById('nav-'+p)?.classList.remove('active')
  })
  document.getElementById('page-'+page)?.classList.remove('hidden')
  document.getElementById('nav-'+page)?.classList.add('active')
  const t = PAGE_TITLES[page]||{}
  const el = $('page-title-bar')
  if(el) el.textContent = isAr() ? t.ar : t.en
  updateBadge()
  if(page==='dash') await renderDash()
  if(page==='incoming') await renderIncoming()
  if(page==='deals') await renderDeals()
  if(page==='detail') await renderDetail(params.dealId)
  if(page==='profile') await renderProfile()
}

function rerender() {
  applyLang()
  const t = PAGE_TITLES[curPage]||{}
  const el = $('page-title-bar')
  if(el) el.textContent = isAr() ? t.ar : t.en
  if(curPage==='dash') renderDash()
  if(curPage==='incoming') renderIncoming()
  if(curPage==='deals') renderDeals()
  if(curPage==='detail' && window._pageParams?.dealId) renderDetail(window._pageParams.dealId)
  if(curPage==='profile') renderProfile()
}

function updateBadge() {
  const n = DEALS.filter(d=>d.seller_email===CU?.email && d.status==='pending').length
  const b = $('incoming-badge')
  if(b){ b.textContent=n; b.classList.toggle('hidden',n===0) }
}

  const {data} = await sb.from('deals').select('*, payments(*)').or(`buyer_id.eq.${CU.id},seller_email.eq.${CU.email}`).order('created_at',{ascending:false})

window.calcInst = () => {
  const price=parseFloat($('cr-price')?.value)||0, down=parseFloat($('cr-down')?.value)||0, months=parseInt($('cr-months')?.value)||0
  const v=$('calc-val'), b=$('calc-breakdown')
  if(!v) return
  if(price>0&&months>0&&down<price){ const rem=price-down; v.textContent=fmtSAR(rem/months); if(b) b.textContent=`(${fmtSAR(rem)} ÷ ${months})` }
  else { v.textContent='—'; if(b) b.textContent='' }
}

// ══════════════════════════════════════
// SUBMIT DEAL
// ══════════════════════════════════════
window.handleSubmitDeal = async () => {
  const sellerEmail=$('cr-seller')?.value.trim().toLowerCase()
  const item=$('cr-item')?.value
  const desc=$('cr-desc')?.value.trim()
  const price=parseFloat($('cr-price')?.value)
  const down=parseFloat($('cr-down')?.value)||0
  const months=parseInt($('cr-months')?.value)
  const notes=$('cr-notes')?.value.trim()
  const startDate=$('cr-startdate')?.value||todayStr()

  if(!sellerEmail||!item||!price||!months){ toast(isAr()?'⚠️ يرجى ملء الحقول المطلوبة':'⚠️ Fill required fields','error'); return }
  if(months<1||months>60){ toast(isAr()?'⚠️ الأشهر بين 1 و60':'⚠️ Months 1-60','error'); return }
  if(down>=price){ toast(isAr()?'⚠️ الدفعة الأولى أقل من السعر':'⚠️ Down payment < total','error'); return }
  if(sellerEmail===CU.email){ toast(isAr()?'⚠️ لا يمكنك إرسال لنفسك':'⚠️ Cannot send to yourself','error'); return }

  const btn=$('submit-btn'); btn.innerHTML='<span class="spinner"></span>'; btn.disabled=true
  const installment=Math.round(((price-down)/months)*100)/100
  const {data:deal,error} = await sb.from('deals').insert({
    contract_num:genId(), buyer_id:CU.id, buyer_email:CU.email,
    buyer_name:PROFILE?.full_name||CU.email.split('@')[0],
    seller_email:sellerEmail, item, description:desc, price, down_payment:down,
    months, installment, notes, start_date:startDate, status:'pending'
  }).select().single()

  if(error){ toast('⚠️ '+error.message,'error'); btn.innerHTML='📤 '+(isAr()?'إرسال الطلب':'Send Request'); btn.disabled=false; return }

  const schedule=Array.from({length:months},(_,i)=>({deal_id:deal.id,month_num:i+1,due_date:addMonths(startDate,i+1),amount:installment,is_paid:false}))
  await sb.from('payments').insert(schedule)

  ;['cr-seller','cr-desc','cr-price','cr-notes'].forEach(id=>{const el=$(id);if(el)el.value=''})
  $('cr-item').value=''; $('cr-down').value='0'; $('cr-months').value=''; $('calc-val').textContent='—'

  toast(isAr()?'✅ تم إرسال الطلب بنجاح!':'✅ Request sent!','success')
  await loadDeals()
  await navigate('dash')
}

function buildCard(deal) {
  const isBuyer=deal.buyer_id===CU.id||deal.buyer_email===CU.email
  const payments=deal.payments||[]
  const paid=payments.filter(p=>p.is_paid).length, total=deal.months||1
  const pct=Math.round((paid/total)*100)
  const other=isBuyer?deal.seller_email:deal.buyer_name
  const role=isBuyer?(isAr()?'إلى:':'To:'):(isAr()?'من:':'From:')
  const pfCls=pct>=100?'pf-green':'pf-blue'
  return `<div class="deal-card" onclick="navigate('detail',{dealId:'${deal.id}'})">
    <div class="deal-icon">${getIcon(deal.item)}</div>
    <div class="deal-body">
      <div class="deal-title">${deal.item}${deal.description?' — '+deal.description:''}</div>
      <div class="deal-meta">${role} <strong>${other}</strong> • ${fmtDate(deal.created_at)}</div>
      ${deal.status==='active'?`<div class="progress-label"><span>${paid}/${total}</span><span>${pct}%</span></div><div class="progress-track"><div class="progress-fill ${pfCls}" style="width:${pct}%"></div></div>`:''}
    </div>
    <div class="deal-right">
      <div class="deal-price">${fmtSAR(deal.price)}</div>
      <div class="deal-price-sub">${fmtSAR(deal.installment)}/${isAr()?'شهر':'mo'}</div>
      <div style="margin-top:8px">${statusBadge(deal.status)}</div>
    </div>
  </div>`
}

function emptyState(emoji,title) { return `<div class="empty-state"><div class="empty-emoji">${emoji}</div><div class="empty-title">${title}</div></div>` }

            <div class="contract-terms"><ol>${(isAr()?['يلتزم المشتري بسداد الأقساط في مواعيدها.','يلتزم البائع بتسليم السلعة عند استلام الدفعة الأولى.','في حال التأخر يحق للبائع إخطار المشتري.','قسطني وسيط فقط وليست طرفاً في الاتفاقية.']:['Buyer commits to paying installments on time.','Seller commits to deliver item upon down payment.','Late payments allow seller to notify buyer.','Qastni is intermediary only.']).map(t=>`<li>${t}</li>`).join('')}</ol></div>
          </div>
          ${deal.notes?`<div class="contract-section"><div class="contract-section-title">${isAr()?'ملاحظات':'Notes'}</div><div class="contract-terms">${deal.notes}</div></div>`:''}
          <div class="contract-sig-row">
            <div class="contract-sig"><div>${isAr()?'توقيع المشتري':'Buyer Signature'}</div><div style="margin-top:4px;font-weight:700;color:var(--g700)">${deal.buyer_name}</div></div>
            <div class="contract-sig"><div>${isAr()?'توقيع البائع':'Seller Signature'}</div><div style="margin-top:4px;font-weight:700;color:var(--g700)">${deal.seller_email}</div></div>
          </div>
        </div>
        <div class="contract-footer">${isAr()?'وثيقة صادرة من منصة قسطني — لأغراض الاتفاق فقط':'Document issued by Qastni platform — for agreement purposes only'}<br>${isAr()?'تاريخ الإصدار:':'Issued:'} ${fmtDate(deal.created_at)}</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h2>⭐ ${isAr()?'التقييمات':'Ratings'}</h2></div>
      <div class="card-body">${ratingsHtml}</div>
    </div>`
}

async function renderProfile() {
  const name=PROFILE?.full_name||CU.email.split('@')[0]
  const color=PROFILE?.avatar_color||avatarBg(CU.email)
  const {data:ratings=[]}=await sb.from('ratings').select('*').eq('to_email',CU.email)
  const avg=ratings.length?Math.round(ratings.reduce((s,r)=>s+r.stars,0)/ratings.length*10)/10:null

  $('profile-content').innerHTML=`
    <div class="card mb20">
      <div style="background:linear-gradient(135deg,var(--b600),var(--b800));padding:32px 28px;text-align:center;border-radius:var(--r16) var(--r16) 0 0">
        <div style="width:72px;height:72px;border-radius:50%;background:${color};border:3px solid rgba(255,255,255,.3);display:inline-flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#fff;margin-bottom:12px">${initials(name)}</div>
        <h2 style="color:#fff;font-size:20px;font-weight:800">${name}</h2>
        <div style="color:rgba(255,255,255,.65);font-size:13px;margin-top:4px">${CU.email}</div>
        <div style="margin-top:10px">${avg?renderStars(avg,ratings.length,16):`<span style="color:rgba(255,255,255,.5);font-size:12px">${isAr()?'لا تقييمات بعد':'No ratings yet'}</span>`}</div>
      </div>
      <div class="card-body">
        <div class="info-grid">
          ${PROFILE?.phone?`<div class="info-item"><div class="info-label">${isAr()?'الجوال':'Phone'}</div><div class="info-value">${PROFILE.phone}</div></div>`:''}
          ${PROFILE?.national_id?`<div class="info-item"><div class="info-label">${isAr()?'الهوية':'ID'}</div><div class="info-value">${PROFILE.national_id}</div></div>`:''}
          <div class="info-item"><div class="info-label">${isAr()?'تاريخ الانضمام':'Since'}</div><div class="info-value">${fmtDate(CU.created_at)}</div></div>
        </div>
      </div>
    </div>
    <div class="info-grid-3 mb20">
      <div class="stat-card"><div class="stat-icon" style="background:#dbeafe">📊</div><div class="stat-value">${DEALS.length}</div><div class="stat-label ar-text">إجمالي الصفقات</div><div class="stat-label en-text hidden">Total</div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#dcfce7">✅</div><div class="stat-value">${DEALS.filter(d=>d.status==='completed').length}</div><div class="stat-label ar-text">مكتملة</div><div class="stat-label en-text hidden">Completed</div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#fef3c7">⭐</div><div class="stat-value">${avg||'—'}</div><div class="stat-label ar-text">متوسط التقييم</div><div class="stat-label en-text hidden">Avg Rating</div></div>
    </div>
    <div class="card mb20">
      <div class="card-header"><h2>⭐ ${isAr()?'التقييمات المستلمة':'Reviews'}</h2><span class="badge b-blue">${ratings.length}</span></div>
      <div class="card-body">${ratings.length
        ?ratings.map(r=>`<div style="padding:12px 0;border-bottom:1px solid var(--g100)"><div class="flex aic jsb mb8"><strong class="text-sm">${r.from_name}</strong>${renderStars(r.stars,1)}</div>${r.comment?`<p class="text-sm text-muted">"${r.comment}"</p>`:''}<div class="text-xs text-muted mt8">${fmtDate(r.created_at)}</div></div>`).join('')
        :emptyState('⭐',isAr()?'لا تقييمات بعد':'No reviews yet')}</div>
    </div>
    <div class="disclaimer-bar">⚠️ <span class="ar-text">قسطني منصة وساطة فقط — لا تُجري معاملات مالية</span><span class="en-text hidden">Qastni is mediation only — no real transactions</span></div>`
  applyLang()
}

// ══════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════
window.handleRespond = async (dealId, status) => {
  const updates={status}
  if(status==='active'){updates.accepted_at=new Date().toISOString();updates.seller_id=CU.id}
  else updates.rejected_at=new Date().toISOString()
  await sb.from('deals').update(updates).eq('id',dealId)
  await loadDeals()
  toast(status==='active'?(isAr()?'✅ تمت الموافقة':'✅ Accepted'):(isAr()?'❌ تم الرفض':'❌ Rejected'), status==='active'?'success':'error')
  updateBadge()
  renderIncoming()
}

window.handleMarkPaid = async (dealId, paymentId) => {
  await sb.from('payments').update({is_paid:true, paid_at:new Date().toISOString()}).eq('id',paymentId)
  const {data:allPay}=await sb.from('payments').select('is_paid').eq('deal_id',dealId)
  const allDone=allPay?.every(p=>p.is_paid)
  if(allDone){ await sb.from('deals').update({status:'completed',completed_at:new Date().toISOString()}).eq('id',dealId) }
  await loadDeals()
  toast(allDone?(isAr()?'🎉 اكتملت الصفقة!':'🎉 Deal completed!'):(isAr()?'💰 تم تسجيل الدفعة':'💰 Payment recorded'),'success')
  await renderDetail(dealId)
}

window.printContract = dealId => {
  const el=document.getElementById('contract-'+dealId)
  if(!el) return
  const w=window.open('','_blank','width=800,height=700')
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Contract</title><style>body{font-family:Tajawal,sans-serif;direction:${isAr()?'rtl':'ltr'};padding:20px;color:#0f172a}</style></head><body>${el.outerHTML}</body></html>`)
  w.document.close(); w.focus(); setTimeout(()=>w.print(),500)
}

// ══════════════════════════════════════
// RATINGS
// ══════════════════════════════════════
window.openRatingModal = (dealId, targetEmail) => {
  ratingState={dealId, targetEmail, stars:0}
  document.querySelectorAll('.star-rate').forEach(s=>s.classList.remove('active'))
  $('rating-comment').value=''
  $('rating-modal').classList.remove('hidden')
}
window.closeRatingModal = () => $('rating-modal').classList.add('hidden')
window.setStarRating = val => {
  ratingState.stars=val
  document.querySelectorAll('.star-rate').forEach(s=>s.classList.toggle('active',parseInt(s.dataset.v)<=val))
}
window.handleSubmitRating = async () => {
  if(!ratingState.stars){ toast(isAr()?'⚠️ اختر عدد النجوم':'⚠️ Select stars','error'); return }
  await sb.from('ratings').insert({deal_id:ratingState.dealId,from_user_id:CU.id,from_email:CU.email,from_name:PROFILE?.full_name||CU.email.split('@')[0],to_email:ratingState.targetEmail,stars:ratingState.stars,comment:$('rating-comment').value.trim()||null})
  closeRatingModal()
  toast(isAr()?'⭐ شكراً! تم إرسال تقييمك':'⭐ Rating submitted!','success')
  await renderDetail(ratingState.dealId)
  updateSbStars()
}

// ══════════════════════════════════════
// BOOT
// ══════════════════════════════════════
// Check session on load FIRST (handles page refresh)
async function boot() {
  const { data: { session } } = await sb.auth.getSession()
  if(session) {
    CU = session.user
    const {data:profile} = await sb.from('profiles').select('*').eq('id',CU.id).single()
    PROFILE = profile
    await loadDeals()
    buildShell()
    await navigate('dash')
  } else {
    $('app').innerHTML = getAuthHTML()
    applyLang()
  }
}

// Listen for auth changes (login/logout)
sb.auth.onAuthStateChange(async (event, session) => {
  if(event === 'SIGNED_IN' && !CU) {
    CU = session.user
    const {data:profile} = await sb.from('profiles').select('*').eq('id',CU.id).single()
    PROFILE = profile
    await loadDeals()
    buildShell()
    await navigate('dash')
  } else if(event === 'SIGNED_OUT') {
    CU=null; PROFILE=null; DEALS=[]
    $('app').innerHTML = getAuthHTML()
    applyLang()
  }
})

boot()
</script>
</body>
</html>
